name: CD — Deploy to Server

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  APP_DIR: /opt/gennety

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            cd ${{ env.APP_DIR }}

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Rebuild and restart (only app service, DB is Supabase)
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans app

            # Clean up old images
            docker image prune -f

            echo "Deploy completed successfully"

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            sleep 10

            # Check if container is running
            if docker ps --filter "name=gennety-app" --filter "status=running" | grep -q gennety-app; then
              echo "Container is running"
            else
              echo "ERROR: Container is not running!"
              docker logs gennety-app --tail 50
              exit 1
            fi

            # HTTP health check
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || true)
            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
              echo "Health check passed (HTTP $HTTP_STATUS)"
            else
              echo "ERROR: Health check failed (HTTP $HTTP_STATUS)"
              docker logs gennety-app --tail 50
              exit 1
            fi
